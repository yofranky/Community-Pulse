name: Deploy Stlite App

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Stlite
        run: |
          python -m pip install --upgrade pip
          pip install stlite

      - name: Build Stlite app
        run: |
          # Stlite bundles the Streamlit app into a static HTML/JS site
          stlite build app/app.py --output-dir _site

      - name: Copy data.json into the build output
        run: |
          cp data/data.json _site/data.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4