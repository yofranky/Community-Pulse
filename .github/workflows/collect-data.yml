name: Collect Community Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    # Allow manual trigger with optional source selection
    inputs:
      sources:
        description: "Comma-separated sources to collect (default: all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (print output without writing)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can commit
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Install Ollama for SLM inference
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama pull phi3.5:3.8b-mini-instruct-q4_K_M
          # Start Ollama in background and wait for it to be ready
          ollama serve &
          sleep 5
          # Verify model is loaded
          ollama list | grep phi3.5 || echo "Model check done"

      - name: Run ETL collection
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCES_FLAG=""
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            SOURCES_FLAG="--sources ${{ github.event.inputs.sources }}"
          fi

          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          python scripts/collect.py $SOURCES_FLAG $DRY_FLAG

      - name: Validate output
        run: python scripts/validate.py --data data/data.json --schema schemas/data-schema.json

      - name: Commit updated data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "community-pulse-bot"
          git config user.email "bot@everpure.com"
          git add data/data.json
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to data.json. Skipping commit."
          else
            git commit -m "chore(data): update community signals [skip ci]"
            git push
          fi