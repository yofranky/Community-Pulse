name: Validate Community Data

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/**"
      - "schemas/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Validate data.json against schema
        run: python scripts/validate.py --data data/data.json --schema schemas/data-schema.json --strict

      - name: Run ETL dry-run (sources without credentials will skip)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect.py --dry-run --no-merge